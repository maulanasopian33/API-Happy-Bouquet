name: Deploy to Shared Hosting

on:
  push:
    tags:
      - "v*" # Trigger on version tags, e.g., v1.0.0

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Use a stable Node version

      # Install dependencies (Clean Install)
      - name: Install dependencies
        run: npm ci

      # Build Project (TypeScript -> JavaScript in /dist)
      - name: Build Project
        run: npm run build

      # Remove devDependencies to save space (Critical for FTP)
      - name: Prune dev dependencies
        run: npm prune --production

      # Prepare deploy dir (without node_modules)
      - name: Prepare deploy folder
        run: |
          mkdir deploy
          cp -r dist deploy/dist
          cp package.json deploy/package.json
          cp package-lock.json deploy/package-lock.json
          
          # Migration files
          cp -r migrations deploy/migrations
          if [ -d "seeders" ]; then
            cp -r seeders deploy/seeders
          else
            echo "Seeders directory not found, skipping."
          fi
          
          # Use Production .sequelizerc
          cp .sequelizerc.prod deploy/.sequelizerc

      # Compress deploy folder
      - name: Compress artifacts
        run: tar -czvf deploy.tar.gz -C deploy .

      # Upload archive via SCP
      - name: Upload archive via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: ${{ secrets.SSH_TARGET_DIR }}

      # Extract, install production dependencies, and restart via SSH
      - name: Execute remote commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.SSH_TARGET_DIR }}
            tar -xzvf deploy.tar.gz
            rm deploy.tar.gz
            npm install --production
            mkdir -p tmp
            touch tmp/restart.txt
